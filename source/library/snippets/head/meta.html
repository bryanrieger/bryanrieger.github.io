<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0"/>
	<meta name="generator" content="{{ site.generator }}"/>
	<meta name="theme-color" content="{% if theme %}{{ theme }}{% else %}{{ site.theme }}{% endif %}" />
	<meta name="robots" content="{{ site.robots }}"/>
	<meta name="rating" content="{{ site.rating }}"/>
	<meta name="author" content="{{ site.author }}"/>
	<meta name="copyright" content="{{ site.copyright }}"/>
	<meta name="keywords" content="{{ description }}"/>
	<meta name="description" content="{{ description }}"/>
	<meta property="og:description" content="{{ description }}"/>
	<meta property="twitter:description" content="{{ description }}"/>
	<meta property="og:type" content="website"/>
	<meta property="twitter:card" content="summary_large_image"/>
	<meta property="og:url" content="https://{{ site.domain }}{{ page.url | cleanURL }}"/>
	<meta property="twitter:url" content="https://{{ site.domain }}{{ page.url | cleanURL }}"/>
	<meta property="og:image" content="https://{{ site.domain }}{{ image }}"/>
	<meta property="twitter:image" content="https://{{ site.domain }}{{ image }}"/>
	<meta property="twitter:site" content="@{{ site.social.twitter }}"/>
	<meta property="twitter:creator" content="@{{ site.social.twitter }}"/>
	<meta name="apple-mobile-web-app-title" content="{{ site.shortname }}"/>
